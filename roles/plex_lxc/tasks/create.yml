---
- name: Check if LXC template is available
  ansible.builtin.command: pveam list {{ plex_lxc_template_storage }}
  register: pveam_list
  changed_when: false

- name: Download LXC template
  ansible.builtin.command: >
    pveam download {{ plex_lxc_template_storage }} {{ plex_lxc_template }}
  when: plex_lxc_template not in pveam_list.stdout
  changed_when: true

- name: Check if LXC already exists
  ansible.builtin.command: pct status {{ plex_lxc_id }}
  register: lxc_status
  changed_when: false
  failed_when: false

- name: Create Plex LXC container
  ansible.builtin.command: >
    pct create {{ plex_lxc_id }}
    {{ plex_lxc_template_storage }}:vztmpl/{{ plex_lxc_template }}
    --hostname {{ plex_lxc_hostname }}
    --storage {{ plex_lxc_storage }}
    --rootfs {{ plex_lxc_storage }}:{{ plex_lxc_disk }}
    --cores {{ plex_lxc_cores }}
    --memory {{ plex_lxc_memory }}
    --swap {{ plex_lxc_swap }}
    --net0 name=eth0,bridge=vmbr0,ip={{ plex_lxc_ip }}/24,gw={{ network_gateway }}
    --features {{ plex_lxc_features }}
    --onboot 1
    --unprivileged 1
    --tags "{{ plex_lxc_tags }}"
    --timezone {{ arr_timezone }}
  when: lxc_status.rc != 0
  changed_when: true
  register: lxc_created

- name: Configure bind mount for media
  ansible.builtin.command: >
    pct set {{ plex_lxc_id }} -mp0 {{ media_mount_path }}/media,mp=/data/media
  when: lxc_created.changed | default(false)
  changed_when: true
