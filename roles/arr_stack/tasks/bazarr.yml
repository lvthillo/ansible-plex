---
# Bazarr configuration is done manually via the UI.
# The API and config.yaml manipulation are unreliable for:
# - Authentication (password hashing)
# - Language profiles (no POST endpoint, DB inserts fragile)
# - Provider credentials
# - Subsync settings

- name: Display Bazarr setup instructions
  ansible.builtin.debug:
    msg: |
      Bazarr is running at http://{{ docker_vm_ip }}:6767

      Configure manually:

      1. Settings -> Sonarr -> Enable
         - Address: http://sonarr
         - Port: 8989
         - API Key: kopier uit Sonarr -> Settings -> General

      2. Settings -> Radarr -> Enable
         - Address: http://radarr
         - Port: 7878
         - API Key: kopier uit Radarr -> Settings -> General

      3. Settings -> Languages
         - Add New Profile -> Name: Dutch
         - Add Dutch (primary) + English (fallback)
         - Default Settings for Series: Dutch
         - Default Settings for Movies: Dutch

      4. Settings -> Providers -> + -> OpenSubtitles.com
         - Username: jouw OpenSubtitles username
         - Password: jouw OpenSubtitles password
         - Test -> Save

      5. Settings -> Subtitles -> Subtitle Auto-Synchronization
         - Enable: aan
         - Always use Audio Track as Reference: aan

      6. Settings -> General -> Security (optioneel)
         - Authentication: Forms
         - Username/Password instellen
