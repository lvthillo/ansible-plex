---
- name: Install NFS server
  ansible.builtin.apt:
    name: nfs-kernel-server
    state: present
    update_cache: true

- name: Deploy /etc/exports
  ansible.builtin.template:
    src: exports.j2
    dest: /etc/exports
    owner: root
    group: root
    mode: "0644"
  notify:
    - Re-export NFS shares
    - Restart NFS server

- name: Ensure NFS server is enabled and running
  ansible.builtin.systemd:
    name: nfs-kernel-server
    enabled: true
    state: started
